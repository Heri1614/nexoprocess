<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexoProcess | Automatización y Eficiencia</title>
    <style>
        /* Estilos visuales (CSS) */
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #333; 
        }
        header { 
            background-color: #000000; /* Fondo negro para que se funda con tu logo */
            color: white; 
            padding: 10px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .logo {
            height: 60px; /* Ajusta este número si quieres el logo más grande o chico */
            width: auto;
        }
        nav a { 
            color: #e0e0e0; 
            text-decoration: none; 
            margin-left: 25px; 
            font-weight: 500; 
            transition: color 0.3s ease;
        }
        nav a:hover { color: #007bff; /* Azul similar al de tu logo */ }
        
        .hero { 
            background-color: #f4f6f9; 
            padding: 100px 5%; 
            text-align: center; 
        }
        .hero h2 { 
            font-size: 2.8rem; 
            color: #1b263b; 
            margin-bottom: 20px; 
        }
        .hero p { 
            font-size: 1.2rem; 
            max-width: 650px; 
            margin: 0 auto 40px auto; 
            color: #555; 
            line-height: 1.6;
        }
        .btn { 
            background-color: #007bff; /* Azul del logo */
            color: white; 
            padding: 15px 30px; 
            text-decoration: none; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 1.1rem; 
            transition: background-color 0.3s ease;
        }
        .btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <header>
        <img src="LogoNexus.jpg" alt="NexoProcess Logo" class="logo">
        <nav>
            <a href="#inicio">Inicio</a>
            <a href="#portafolio">Portafolio</a>
            <a href="#plantillas">Plantillas</a>
            <a href="#contacto">Contacto</a>
        </nav>
    </header>

    <section class="hero" id="inicio">
        <h2>Automatización y eficiencia para tus procesos operativos</h2>
        <p>Soluciones a medida en Excel, SharePoint y Microsoft Forms para potenciar el rendimiento y eliminar las rutinas manuales de tu empresa.</p>
        <a href="#plantillas" class="btn">Explorar Soluciones</a>
    </section>

</body>
</html>
